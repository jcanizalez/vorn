<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vorn - Offline</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #141416;
        color: #d4d4d8;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
      }
      .container {
        text-align: center;
        max-width: 400px;
      }
      h1 {
        font-size: 1.5rem;
        color: #e4e4e7;
        margin-bottom: 0.75rem;
      }
      p {
        font-size: 0.95rem;
        color: #a1a1aa;
        line-height: 1.6;
        margin-bottom: 1.5rem;
      }
      button {
        background: rgba(0, 255, 212, 0.1);
        color: #00ffd4;
        border: 1px solid rgba(0, 255, 212, 0.2);
        padding: 0.6rem 1.5rem;
        border-radius: 8px;
        font-size: 0.9rem;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background: rgba(0, 255, 212, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>You're offline</h1>
      <p>
        Vorn needs an active connection to manage your agent terminals. Please check your network
        and try again.
      </p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
